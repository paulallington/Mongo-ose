appId: com.paulallington.mongo-ose
productName: Mongo-ose

directories:
  output: release

files:
  - electron/dist/**/*
  - server-bundle/**/*
  - client/dist/**/*
  - build/icon.png
  - "!node_modules/**/*"

asarUnpack:
  - server-bundle/**/*
  - client/dist/**/*

win:
  target: nsis
  icon: build/icon.png

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Mongo-ose
